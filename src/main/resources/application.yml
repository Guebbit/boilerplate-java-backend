spring:
  application:
    name: boilerplate-java-backend
  data:
    mongodb:
      uri: ${NODE_DB_URI}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${NODE_PORT:3000}

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  security:
    issuer: ${NODE_URL:http://localhost:3000}
    access-token-secret: ${NODE_ACCESS_TOKEN_SECRET}
    refresh-token-secret: ${NODE_REFRESH_TOKEN_SECRET}
  tokens:
    access-token-seconds: ${NODE_ACCESS_TOKEN_SECRET_TIME:3600}
    refresh-token-seconds: ${NODE_REFRESH_TOKEN_SECRET_TIME_LONG:604800}
  rate-limit-per-minute: ${NODE_RATE_LIMIT_PER_MINUTE:120}
  token-cleanup-interval-minutes: ${NODE_TOKEN_CLEANUP_INTERVAL:30}
